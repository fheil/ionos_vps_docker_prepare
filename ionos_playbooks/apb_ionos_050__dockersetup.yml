---
- name: Set up Docker CE (exact match to your manual installation)
  hosts: srv
  become: true
  vars:
    # Dynamische Variablen aus inventory.yml (mit Fallback)
    username: "{{ hostvars[inventory_hostname]['username'] | default('foo') }}"

  tasks:
    # 1. System vorbereiten
    - name: Update package index
      apt:
        update_cache: true

    - name: Remove old Docker versions (if any)
      apt:
        name:
          - docker.io
          - docker-compose
          - docker-compose-v2
          - docker-doc
          - podman-docker
          - containerd
          - runc
        state: absent
        autoremove: yes

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    # 2. Docker-Repository einrichten
    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Get OS codename (Ubuntu/Debian)
      command: >
        bash -c 'source /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"'
      register: os_codename
      changed_when: false

    - name: Get system architecture
      command: dpkg --print-architecture
      register: os_architecture
      changed_when: false

    - name: Add Docker repository (Deb822 format)
      copy:
        dest: /etc/apt/sources.list.d/docker.sources
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ os_codename.stdout }}
          Components: stable
          Architectures: {{ os_architecture.stdout }}
          Signed-By: /etc/apt/keyrings/docker.asc
        mode: '0644'

    # 3. Docker installieren
    - name: Update APT cache
      apt:
        update_cache: true

    - name: Install Docker CE packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    # 4. Benutzer zur docker-Gruppe hinzufügen
    - name: Add user to docker group
      user:
        name: "{{ username }}"
        groups: docker
        append: yes

    # 5. Docker-Service starten
    - name: Ensure Docker is running and enabled
      service:
        name: docker
        state: started
        enabled: true

    # 6. Optional: Docker-Version prüfen
    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Print Docker version
      debug:
        msg: "Docker installed: {{ docker_version.stdout }}"
