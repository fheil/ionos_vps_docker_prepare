---
- name: Set up Docker & Compose on Ubuntu 24.04 (Deb822 format)
  hosts: srv
  become: true

  tasks:
    - name: Update package index
      apt:
        update_cache: true

    - name: Remove old Docker versions
      apt:
        name:
          - docker.io
          - docker-compose
          - docker-compose-v2
          - docker-doc
          - podman-docker
          - containerd
          - runc
        state: absent

    - name: Install dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: latest

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Get OS codename
      ansible.builtin.command: >
        bash -c 'source /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"'
      register: os_codename
      changed_when: false

    - name: Get system architecture
      ansible.builtin.command: dpkg --print-architecture
      register: os_architecture
      changed_when: false

    - name: Add Docker repository (Deb822 format)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.sources
        content: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ os_codename.stdout }}
          Components: stable
          Architectures: {{ os_architecture.stdout }}
          Signed-By: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Update APT cache
      apt:
        update_cache: true

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest

    - name: Ensure Docker is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
